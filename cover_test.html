<!DOCTYPE html>
<html lang="en" class="h-100">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cover Template · Bootstrap</title>
    
    <!-- SOLO EL CSS DE BOOTSTRAP (desde CDN) -->
    <link href="#" rel="#">
    
    <style>
        /* Estilos específicos de Cover (copiados del original) */
        .cover-container {
            max-width: 42em;
        }
        .nav-masthead .nav-link {
            color: rgba(255, 255, 255, .5);
            border-bottom: .25rem solid transparent;
        }
        .nav-masthead .nav-link:hover,
        .nav-masthead .nav-link:focus {
            border-bottom-color: rgba(255, 255, 255, .25);
        }
        .nav-masthead .nav-link + .nav-link {
            margin-left: 1rem;
        }
        .nav-masthead .active {
            color: #fff;
            border-bottom-color: #fff;
        }
        /* Opcional: fondo personalizado */
        body {
            background-image: linear-gradient(rgba(0,0,0,.5), rgba(0,0,0,.5)), url('https://images.unsplash.com/photo-1497290756760-23ac55edf36f?auto=format&fit=crop&w=1920&q=80');
            background-size: cover;
            background-position: center;
        }
    </style>
</head>
<body class="d-flex h-100 text-center text-bg-dark">
    
    <div class="cover-container d-flex w-100 h-100 p-3 mx-auto flex-column">
        
        <header class="mb-auto">
            <div>
                <h3 class="float-md-start mb-0">Mi titulo</h3> <!-- Cambiado -->

                    <a class="nav-link fw-bold py-1 px-0" href="#">Contacto</a>
                </nav>

        </header>

        <main class="px-3">
            <h1>Bienvenido a mi Portfolio</h1>
            <p class="lead">Este es un template Cover personalizado para mostrar mis proyectos. Hecho con Bootstrap 5.</p>
            <p class="lead">
                <a href="#" class="btn btn-lg btn-light fw-bold border-white bg-white">Ir a Portfolio</a>
            </p>
        </main>

        <footer class="mt-auto text-white-50">
            <p>Template <a href="https://getbootstrap.com/" class="text-white">Bootstrap</a>, by <a href="https://x.com/mdo" class="text-white">@mdo</a>.</p>
        </footer>
    </div>

    <!-- JS DE BOOTSTRAP (para menús interactivos) -->
    <script src="#"></script>
